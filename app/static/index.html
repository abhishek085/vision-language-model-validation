<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VLM Validation</title>
<style>
  :root {
    --bg: #0f1115; --panel: #171a21; --panel2: #1e222b; --border: #2a2f3a;
    --text: #e6e8ec; --muted: #9aa3b2; --accent: #5b8cff; --accent2: #7a5bff;
    --ok: #3ecf8e; --err: #ff6b6b; --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: baseline; gap: 12px;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 12px; }
  .wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px 24px; }
  @media (max-width: 880px) { .wrap { grid-template-columns: 1fr; } }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 14px 0 6px; }
  label:first-child { margin-top: 0; }
  select, textarea, input[type=file] {
    width: 100%; background: var(--panel2); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 13px;
  }
  textarea { font-family: var(--mono); resize: vertical; min-height: 180px; }
  select { height: 40px; }
  .desc { color: var(--muted); font-size: 12px; margin-top: 6px; min-height: 16px; }
  button {
    margin-top: 16px; width: 100%; padding: 12px; border: 0; border-radius: 8px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: white; font-weight: 600; font-size: 14px; cursor: pointer;
  }
  button:disabled { opacity: .5; cursor: not-allowed; }
  .preview { margin-top: 10px; border: 1px dashed var(--border); border-radius: 8px;
    padding: 8px; text-align: center; color: var(--muted); font-size: 12px; }
  .preview img { max-width: 100%; max-height: 280px; border-radius: 6px; }
  .out-head { display: flex; justify-content: space-between; align-items: center; }
  .meta { color: var(--muted); font-size: 12px; font-family: var(--mono); }
  pre {
    background: var(--panel2); border: 1px solid var(--border); border-radius: 8px;
    padding: 14px; overflow: auto; white-space: pre-wrap; word-break: break-word;
    font-family: var(--mono); font-size: 13px; min-height: 200px; margin: 0;
  }
  .status { font-size: 12px; margin-top: 10px; min-height: 16px; }
  .status.run { color: var(--accent); }
  .status.ok { color: var(--ok); }
  .status.err { color: var(--err); }
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid var(--muted);
    border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: -1px; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header>
  <h1>Vision-Language Model Validation</h1>
  <span class="sub">local · runs on your machine</span>
</header>

<div class="wrap">
  <!-- INPUT -->
  <div class="card">
    <label for="model">Model</label>
    <select id="model"></select>
    <div class="desc" id="modelDesc"></div>

    <label for="file" id="fileLabel">Image / PDF</label>
    <input type="file" id="file" accept="image/*" />
    <div class="preview" id="preview">No file selected</div>

    <label for="prompt" id="promptLabel">Prompt</label>
    <textarea id="prompt" spellcheck="false"></textarea>

    <button id="run">Run</button>
    <div class="status" id="status"></div>
  </div>

  <!-- OUTPUT -->
  <div class="card">
    <div class="out-head">
      <label style="margin:0">Output</label>
      <span class="meta" id="meta"></span>
    </div>
    <pre id="output">—</pre>
  </div>
</div>

<script>
let MODELS = [];

const $ = (id) => document.getElementById(id);

async function loadModels() {
  const res = await fetch("/api/models");
  MODELS = await res.json();
  const sel = $("model");
  sel.innerHTML = "";
  MODELS.forEach((m) => {
    const opt = document.createElement("option");
    opt.value = m.name;
    opt.textContent = m.title;
    sel.appendChild(opt);
  });
  sel.addEventListener("change", applyModel);
  applyModel();
}

function currentModel() {
  return MODELS.find((m) => m.name === $("model").value);
}

function applyModel() {
  const m = currentModel();
  if (!m) return;
  $("modelDesc").textContent = m.description || "";
  $("promptLabel").textContent = m.prompt_label;
  $("prompt").value = m.prompt_default || "";
  // file accept hint
  const accepts = m.accepts || ["image"];
  const wantsPdf = accepts.includes("pdf");
  $("file").accept = wantsPdf ? "image/*,application/pdf" : "image/*";
  $("fileLabel").textContent = wantsPdf ? "Image / PDF" : "Image";
}

$("file").addEventListener("change", (e) => {
  const f = e.target.files[0];
  const box = $("preview");
  box.innerHTML = "";
  if (!f) { box.textContent = "No file selected"; return; }
  if (f.type.startsWith("image/")) {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(f);
    box.appendChild(img);
  } else {
    box.textContent = "📄 " + f.name;
  }
});

$("run").addEventListener("click", async () => {
  const m = currentModel();
  const file = $("file").files[0];
  const status = $("status");

  if (m.requires_file && !file) {
    status.className = "status err";
    status.textContent = "Please choose a file first.";
    return;
  }

  const fd = new FormData();
  fd.append("model", m.name);
  fd.append("prompt", $("prompt").value);
  if (file) fd.append("file", file);

  $("run").disabled = true;
  status.className = "status run";
  status.innerHTML = '<span class="spinner"></span>Running… (first run downloads/loads weights — can take a while)';
  $("output").textContent = "—";
  $("meta").textContent = "";

  try {
    const res = await fetch("/api/run", { method: "POST", body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || ("HTTP " + res.status));
    $("output").textContent = data.output || "(empty output)";
    $("meta").textContent = Object.entries(data.meta || {})
      .map(([k, v]) => `${k}=${v}`).join("  ·  ");
    status.className = "status ok";
    status.textContent = "Done.";
  } catch (err) {
    status.className = "status err";
    status.textContent = "Error: " + err.message;
    $("output").textContent = "—";
  } finally {
    $("run").disabled = false;
  }
});

loadModels();
</script>
</body>
</html>
